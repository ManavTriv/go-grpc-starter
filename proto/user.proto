syntax = "proto3";

package user;

option go_package = "go-grpc-starter/gen/userpb"; // where the generated Go code goes

// UserService defines operations for managing users
service UserService {
  // GetUser retrieves a user by their ID
  rpc GetUser(GetUserRequest) returns (User);

  // CreateUser creates a new user
  rpc CreateUser(CreateUserRequest) returns (User);
}

message User {
  string id = 1; // numbers are identifiers for binary encoding (not values)
  string name = 2; // once used in prod, never reuse a number
  string email = 3;
}

message GetUserRequest {
  string id = 1;
}

message CreateUserRequest {
  string name = 1;
  string email = 2;
}